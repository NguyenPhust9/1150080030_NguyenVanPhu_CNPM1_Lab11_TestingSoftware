# .github/workflows/selenium-ci.yml
name: Selenium Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    env:
      APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cài Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build project
        run: mvn clean install -DskipTests

      - name: Chạy Selenium Tests
        run: mvn test -Dbrowser=chrome -Denv=dev -DsuiteXmlFile=testng-smoke.xml

      - name: Lưu kết quả test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/screenshots/
          retention-days: 30